<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KCR 2026 기자간담회 참가신청</title>
<style>
  /* ── reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
         background: #F2F2F7; color: #1C1C1E; min-height: 100vh; }

  /* ── layout ── */
  .phone { max-width: 430px; margin: 0 auto; background: #F2F2F7; min-height: 100vh; padding-bottom: 32px; }
  .topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1);
            padding: 14px 16px; display: flex; align-items: center; gap: 10px;
            position: sticky; top: 0; z-index: 10;
            margin: 0 16px; border-radius: 0 0 12px 12px; }
  .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
           background: #E6F1FB; color: #185FA5; }

  /* ── key visual ── */
  .kv-wrap { margin: 12px 16px 0; overflow: hidden; border-radius: 12px; }
  .kv-wrap img { width: 100%; display: block; }

  /* ── content ── */
  .content { padding: 12px 16px; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.08);
          padding: 16px; margin-bottom: 10px; }
  .card-label { font-size: 11px; font-weight: 600; color: #8E8E93;
                letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }

  /* ── intro ── */
  .intro-title { font-size: 18px; font-weight: 700; color: #1C1C1E; margin-bottom: 12px; line-height: 1.4; }
  .intro-text { font-size: 13px; color: #1C1C1E; line-height: 1.7; margin-bottom: 10px; }
  .intro-text:last-of-type { margin-bottom: 0; }
  .intro-sign { font-size: 13px; color: #8E8E93; margin-top: 12px; }
  .schedule-box { background: #E6F1FB; border-left: 3px solid #185FA5; border-radius: 8px;
                  padding: 12px 14px; margin-top: 14px; }
  .schedule-title { font-size: 13px; font-weight: 700; color: #0C447C; margin-bottom: 8px; }
  .schedule-item { font-size: 12.5px; color: #0C447C; line-height: 1.8; }

  /* ── form elements ── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: #8E8E93; margin-bottom: 5px; font-weight: 500; }
  .field label .req { color: #FF3B30; }
  input[type=text], input[type=email], input[type=tel] {
    width: 100%; padding: 10px 12px; border: 0.5px solid #E5E5EA; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: #F9F9F9; color: #1C1C1E;
    outline: none; transition: border-color .15s; -webkit-appearance: none; }
  input:focus { border-color: #185FA5; background: #fff; }
  .field-hint { font-size: 11px; color: #8E8E93; margin-top: 4px; }

  /* ── consent ── */
  .consent-title { font-size: 13px; font-weight: 700; color: #1C1C1E; margin-bottom: 6px; }
  .consent-desc { font-size: 12px; color: #3A3A3C; line-height: 1.7; background: #F9F9F9;
                  border-radius: 8px; padding: 12px; margin-bottom: 10px; white-space: pre-line; }
  .consent-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px;
                 background: #F9F9F9; border-radius: 8px; cursor: pointer;
                 border: 0.5px solid #E5E5EA; transition: all .15s; }
  .consent-row.on { background: #E6F1FB; border-color: #185FA5; }
  .consent-box { width: 20px; height: 20px; border-radius: 4px; border: 1.5px solid #C7C7CC;
                 flex-shrink: 0; display: flex; align-items: center; justify-content: center;
                 font-size: 14px; color: transparent; margin-top: 1px; transition: all .15s; background: #fff; }
  .consent-row.on .consent-box { border-color: #185FA5; background: #185FA5; color: #fff; }
  .consent-text { font-size: 13px; color: #1C1C1E; line-height: 1.5; font-weight: 500; }

  /* ── buttons ── */
  .btn-primary { width: 100%; padding: 14px; background: #185FA5; color: #fff;
                 border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
                 cursor: pointer; margin-top: 4px; font-family: inherit; transition: background .15s; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  /* ── success ── */
  .success-wrap { text-align: center; padding: 28px 16px; }
  .ok-circle { width: 60px; height: 60px; border-radius: 50%; background: #D1F2E0;
               display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
               font-size: 30px; color: #34C759; }
  .success-title { font-size: 18px; font-weight: 700; color: #1C1C1E; margin-bottom: 8px; }
  .success-text { font-size: 14px; color: #8E8E93; line-height: 1.6; }

  /* ── loading overlay ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
             align-items: center; justify-content: center; z-index: 100; }
  .overlay.show { display: flex; }
  .spinner-box { background: #fff; border-radius: 16px; padding: 28px 32px;
                 text-align: center; min-width: 160px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #E5E5EA;
             border-top-color: #185FA5; border-radius: 50%;
             animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { font-size: 14px; color: #8E8E93; }

  /* ── error toast ── */
  .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: #FF3B30; color: #fff; padding: 10px 20px; border-radius: 20px;
           font-size: 14px; font-weight: 600; z-index: 200; white-space: nowrap; }
  .toast.show { display: block; }
</style>
</head>
<body>

<!-- ── 설정 필요 안내 ── -->
<div id="setup-screen" class="phone" style="display:none">
  <div class="topbar">
    <div class="topbar-title">기자간담회 참가신청</div>
    <span class="badge">KCR 2026</span>
  </div>
  <div class="content" style="padding-top:24px">
    <div class="card">
      <div class="card-label">초기 설정 필요</div>
      <div style="background:#E6F1FB;border-radius:10px;padding:12px 14px;font-size:13px;color:#0C447C;line-height:1.6;margin-bottom:10px">
        이 파일을 사용하려면 <b>Apps Script Web App URL</b>을 입력해야 합니다.
      </div>
      <div class="field">
        <label>Apps Script Web App URL</label>
        <input type="text" id="temp-url" placeholder="https://script.google.com/macros/s/...">
      </div>
      <button class="btn-primary" onclick="applyTempUrl()">적용하고 시작</button>
    </div>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="main-app" class="phone" style="display:none">
  <div id="app"></div>
</div>

<!-- ── 로딩 오버레이 ── -->
<div class="overlay" id="overlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <div class="spinner-text">제출 중...</div>
  </div>
</div>

<!-- ── 에러 토스트 ── -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// GAS Web App URL (배포 후 교체)
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbwlVE4sIGcFMFR49nZ1xZDv0matJEr5PHduWOeg0ASt6ON_6pS9pKbMI30dSfPUs-DXwA/exec";

// ============================================================
// 신청 마감일 설정 (한국시간, 이 시각 이후 신청 불가)
// 형식: "YYYY-MM-DD HH:mm" (24시간제)
// 예: "2026-05-10 23:59"
// 빈 문자열("")이면 마감일 없음
// ============================================================
const DEADLINE = "2026-04-26 23:59";

// ============================================================
// 앱 상태
// ============================================================
let GAS = GAS_URL || localStorage.getItem('kcr2026_press_gas_url') || '';
let S = {
  name: "", affiliation: "", phone: "", email: "",
  privacy: false,
  submitted: false,
  closed: false
};

// ============================================================
// 유틸리티
// ============================================================
const g = id => document.getElementById(id);
function showOverlay(on) { g('overlay').classList.toggle('show', on); }
function showToast(msg) {
  const t = g('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ── 마감일 체크 (한국시간 기준) ──
function isClosed() {
  if (!DEADLINE) return false;
  // DEADLINE을 KST 기준으로 파싱 → UTC 타임스탬프로 변환
  const m = DEADLINE.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
  if (!m) return false;
  const [, y, mo, d, h, mi] = m;
  // KST는 UTC+9 → UTC 기준 시각으로 변환
  const deadlineUTC = Date.UTC(+y, +mo - 1, +d, +h - 9, +mi);
  return Date.now() > deadlineUTC;
}
function deadlineText() {
  if (!DEADLINE) return '';
  const m = DEADLINE.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
  if (!m) return DEADLINE;
  const [, y, mo, d, h, mi] = m;
  return `${y}년 ${+mo}월 ${+d}일 ${h}:${mi}`;
}

// ── 전화번호 자동 포매팅 ──
function formatPhone(v) {
  const n = v.replace(/[^0-9]/g, '').slice(0, 11);
  if (n.length <= 3) return n;
  if (n.length <= 7) return n.slice(0,3) + '-' + n.slice(3);
  return n.slice(0,3) + '-' + n.slice(3,7) + '-' + n.slice(7);
}

// ── localStorage 중복 체크 ──
function checkSubmitted() {
  try {
    const d = localStorage.getItem('kcr2026_press_submitted');
    if (d) return JSON.parse(d);
  } catch(e) {}
  return null;
}
function markSubmitted() {
  localStorage.setItem('kcr2026_press_submitted', JSON.stringify({
    email: S.email, name: S.name, ts: new Date().toISOString()
  }));
}

// ============================================================
// 초기화
// ============================================================
window.onload = () => {
  const prev = checkSubmitted();
  if (prev) {
    S.submitted = true;
    S.name = prev.name || '';
    S.email = prev.email || '';
  }
  S.closed = isClosed();
  if (!GAS) {
    g('setup-screen').style.display = 'block';
  } else {
    g('main-app').style.display = 'block';
    render();
  }
};

function applyTempUrl() {
  const url = g('temp-url').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    showToast('올바른 Apps Script URL을 입력해주세요');
    return;
  }
  GAS = url;
  localStorage.setItem('kcr2026_press_gas_url', url);
  g('setup-screen').style.display = 'none';
  g('main-app').style.display = 'block';
  render();
}

// ============================================================
// 렌더링
// ============================================================
function render() {
  let html;
  if (S.submitted) html = viewSuccess();
  else if (S.closed) html = viewClosed();
  else html = viewForm();
  g('app').innerHTML = html;
  bindEvents();
  window.scrollTo(0, 0);
}

function viewClosed() {
  return `
    <div class="topbar">
      <div class="topbar-title">기자간담회 참가신청</div>
      <span class="badge">KCR 2026</span>
    </div>
    <div class="kv-wrap">
      <img src="kv-header.png" alt="KCR 2026 기자간담회">
    </div>
    <div class="content">
      <div class="card">
        <div class="success-wrap">
          <div style="width:60px;height:60px;border-radius:50%;background:#FFE5E5;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#FF3B30;">!</div>
          <div class="success-title">신청이 마감되었습니다</div>
          <div class="success-text">
            KCR 2026 기자간담회 참가신청이<br>
            ${esc(deadlineText())}에 마감되었습니다.<br><br>
            문의: KCR 2026 사무국 (info@kcr2026.com)
          </div>
        </div>
      </div>
    </div>
  `;
}

function viewForm() {
  return `
    <div class="topbar">
      <div class="topbar-title">기자간담회 참가신청</div>
      <span class="badge">KCR 2026</span>
    </div>
    <div class="kv-wrap">
      <img src="kv-header.png" alt="KCR 2026 기자간담회">
    </div>
    <div class="content">
      <div class="card">
        <div class="intro-title">KCR 2026 - 기자간담회 참가신청</div>
        <p class="intro-text">2026년 5월 14일(목)~16일(토)까지 콘래드 서울에서 3일간 개최되는 제46차 대한류마티스학회 춘계학술대회 및 제20차 국제심포지엄 학술대회에 기자님을 초청합니다.</p>
        <p class="intro-text">KCR 2026은 세계적으로 저명한 연자들로 이루어진 주요 세션과 더불어 류마티스 질환연구와 임상 진료의 최신 지식과 경험을 나누는 자리가 될 예정입니다.</p>
        <p class="intro-text">기자 여러분들의 많은 관심과 참여를 부탁 드립니다.</p>
        <p class="intro-text">감사합니다.</p>
        <p class="intro-sign">- KCR 2026 조직위원회 드림 -</p>
        <div class="schedule-box">
          <div class="schedule-title">[ KCR 2026 기자간담회 일정 ]</div>
          <div class="schedule-item">- 일시: 2026년 5월 14일(목), 12:00~ (점심식사 포함)</div>
          <div class="schedule-item">- 장소: 콘래드 서울, Studio 4 (6F)</div>
          <div class="schedule-item">- 참가방법: 아래의 양식을 작성하신 후 제출해 주세요.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">참가자 정보</div>
        <div class="field">
          <label>성함 <span class="req">*</span></label>
          <input id="i-name" type="text" placeholder="성함 입력" value="${esc(S.name)}">
        </div>
        <div class="field">
          <label>소속 <span class="req">*</span></label>
          <input id="i-affiliation" type="text" placeholder="소속 매체/기관 입력" value="${esc(S.affiliation)}">
        </div>
        <div class="field">
          <label>연락처 <span class="req">*</span></label>
          <input id="i-phone" type="tel" placeholder="010-1234-5678" value="${esc(S.phone)}">
        </div>
        <div class="field">
          <label>이메일 주소 <span class="req">*</span></label>
          <input id="i-email" type="email" placeholder="info@kcr2026.com" value="${esc(S.email)}">
        </div>
      </div>

      <div class="card">
        <div class="card-label">개인정보 활용 동의</div>
        <div class="consent-title">개인정보의 수집 및 이용 동의서</div>
        <div class="consent-desc">이용자가 제공한 모든 정보는 다음의 목적을 위해 활용하며, 하기 목적 이외의 용도로는 사용되지 않습니다.

① 개인정보 수집 항목 및 수집·이용 목적
*수집 항목 (필수항목) - 이름, 전화번호(휴대전화)
*수집 및 이용 목적 - 참가자 연락 및 차기대회 홍보

② 개인정보 보유 및 이용기간
- 수집·이용 동의일로부터 1년</div>
        <div class="consent-row ${S.privacy ? 'on' : ''}" id="consent-row">
          <div class="consent-box">✓</div>
          <div class="consent-text">동의합니다.</div>
        </div>
      </div>

      <button class="btn-primary" id="btn-submit">제출하기</button>
    </div>
  `;
}

function viewSuccess() {
  return `
    <div class="topbar">
      <div class="topbar-title">기자간담회 참가신청</div>
      <span class="badge">KCR 2026</span>
    </div>
    <div class="content">
      <div class="card">
        <div class="success-wrap">
          <div class="ok-circle">✓</div>
          <div class="success-title">제출이 완료되었습니다</div>
          <div class="success-text">
            ${esc(S.name) ? esc(S.name) + '님, ' : ''}KCR 2026 기자간담회<br>
            참가신청이 정상적으로 접수되었습니다.<br>
            감사합니다.
          </div>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// 이벤트 바인딩
// ============================================================
function bindEvents() {
  if (S.submitted) return;

  const nameEl = g('i-name');
  if (nameEl) nameEl.oninput = e => S.name = e.target.value;

  const affEl = g('i-affiliation');
  if (affEl) affEl.oninput = e => S.affiliation = e.target.value;

  const phoneEl = g('i-phone');
  if (phoneEl) phoneEl.oninput = e => {
    const formatted = formatPhone(e.target.value);
    e.target.value = formatted;
    S.phone = formatted;
  };

  const emailEl = g('i-email');
  if (emailEl) emailEl.oninput = e => S.email = e.target.value;

  const consentEl = g('consent-row');
  if (consentEl) consentEl.onclick = () => {
    S.privacy = !S.privacy;
    consentEl.classList.toggle('on', S.privacy);
  };

  const btn = g('btn-submit');
  if (btn) btn.onclick = submit;
}

// ============================================================
// 유효성 검증 및 제출
// ============================================================
function validate() {
  S.name = (g('i-name')?.value || '').trim();
  S.affiliation = (g('i-affiliation')?.value || '').trim();
  S.phone = (g('i-phone')?.value || '').trim();
  S.email = (g('i-email')?.value || '').trim();

  if (!S.name || S.name.length < 2) { showToast('성함을 입력해주세요 (2자 이상)'); return false; }
  if (!S.affiliation) { showToast('소속을 입력해주세요'); return false; }
  if (!/^01[016789]-\d{3,4}-\d{4}$/.test(S.phone)) {
    showToast('연락처를 올바른 형식으로 입력해주세요 (하이픈 포함)'); return false; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.email)) {
    showToast('올바른 이메일 주소를 입력해주세요'); return false; }
  if (!S.privacy) { showToast('개인정보 수집에 동의해주세요'); return false; }
  return true;
}

async function submit() {
  if (isClosed()) {
    S.closed = true;
    render();
    return;
  }
  if (!validate()) return;
  showOverlay(true);
  try {
    const payload = {
      name: S.name,
      affiliation: S.affiliation,
      phone: S.phone,
      email: S.email,
      privacy: true,
      ts: new Date().toISOString()
    };
    const res = await fetch(GAS, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    markSubmitted();
    S.submitted = true;
    render();
  } catch (err) {
    showToast('제출 실패. 잠시 후 다시 시도해주세요');
  } finally {
    showOverlay(false);
  }
}
</script>

</body>
</html>
